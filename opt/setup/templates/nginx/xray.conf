# Map Connection Upgrade
map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

# 1) Map Public Path -> INTERNAL PORT
map $uri $internal_port {
  default 0;

  ~^/(?:[^/]+/)?vless-ws(?:/|$)    __P_VLESS_WS__;
  ~^/(?:[^/]+/)?vmess-ws(?:/|$)    __P_VMESS_WS__;
  ~^/(?:[^/]+/)?trojan-ws(?:/|$)   __P_TROJAN_WS__;
  ~^/(?:[^/]+/)?ss-ws(?:/|$) __P_SS_WS__;
  ~^/(?:[^/]+/)?ss2022-ws(?:/|$) __P_SS2022_WS__;

  ~^/(?:[^/]+/)?vless-hup(?:/|$)   __P_VLESS_HUP__;
  ~^/(?:[^/]+/)?vmess-hup(?:/|$)   __P_VMESS_HUP__;
  ~^/(?:[^/]+/)?trojan-hup(?:/|$)  __P_TROJAN_HUP__;
  ~^/(?:[^/]+/)?ss-hup(?:/|$) __P_SS_HUP__;
  ~^/(?:[^/]+/)?ss2022-hup(?:/|$) __P_SS2022_HUP__;

  # gRPC requests usually come as /<serviceName>/Tun, so match prefix
  ~^/(?:[^/]+/)?vless-grpc(?:/|$)  __P_VLESS_GRPC__;
  ~^/(?:[^/]+/)?vmess-grpc(?:/|$)  __P_VMESS_GRPC__;
  ~^/(?:[^/]+/)?trojan-grpc(?:/|$) __P_TROJAN_GRPC__;
  ~^/(?:[^/]+/)?ss-grpc(?:/|$) __P_SS_GRPC__;
  ~^/(?:[^/]+/)?ss2022-grpc(?:/|$) __P_SS2022_GRPC__;

}

# 2) Map Public Path -> INTERNAL PATH (WebSocket, HTTPUpgrade)
map $uri $internal_path {
  default "";

  ~^/(?:[^/]+/)?vless-ws(?:/|$)    __I_VLESS_WS__;
  ~^/(?:[^/]+/)?vmess-ws(?:/|$)    __I_VMESS_WS__;
  ~^/(?:[^/]+/)?trojan-ws(?:/|$)   __I_TROJAN_WS__;
  ~^/(?:[^/]+/)?ss-ws(?:/|$) __I_SS_WS__;
  ~^/(?:[^/]+/)?ss2022-ws(?:/|$) __I_SS2022_WS__;

  ~^/(?:[^/]+/)?vless-hup(?:/|$)   __I_VLESS_HUP__;
  ~^/(?:[^/]+/)?vmess-hup(?:/|$)   __I_VMESS_HUP__;
  ~^/(?:[^/]+/)?trojan-hup(?:/|$)  __I_TROJAN_HUP__;
  ~^/(?:[^/]+/)?ss-hup(?:/|$) __I_SS_HUP__;
  ~^/(?:[^/]+/)?ss2022-hup(?:/|$) __I_SS2022_HUP__;
}

# 3) Map Public Path -> gRPC Service Name
map $uri $grpc_service_name {
  default "";

  ~^/(?:[^/]+/)?vless-grpc(?:/|$)  __I_VLESS_GRPC__;
  ~^/(?:[^/]+/)?vmess-grpc(?:/|$)  __I_VMESS_GRPC__;
  ~^/(?:[^/]+/)?trojan-grpc(?:/|$) __I_TROJAN_GRPC__;
  ~^/(?:[^/]+/)?ss-grpc(?:/|$) __I_SS_GRPC__;
  ~^/(?:[^/]+/)?ss2022-grpc(?:/|$) __I_SS2022_GRPC__;
}

server {
__NGINX_LISTEN_BLOCK__
  server_name __DOMAIN__;

__NGINX_TLS_BLOCK__

  # --- SSH WebSocket ---
  location ~ "^/(?:(?!(?:vless|vmess|trojan|ss|ss2022)-(?:ws|hup|grpc)/)[^/]+/)?[A-Fa-f0-9]{10}$" {
    if ($http_upgrade !~* websocket) { return 404; }

    proxy_redirect off;
    proxy_pass http://127.0.0.1:__SSHWS_PROXY_PORT__;

    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header CF-Connecting-IP $remote_addr;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $remote_addr;

    proxy_read_timeout 7d;
    proxy_send_timeout 7d;
  }

  # --- WebSocket ---
  location ~ ^/(?:[^/]+/)?(vless|vmess|trojan|ss|ss2022)-ws(?:/|$) {
    # capture map results BEFORE rewrite changes $uri
    set $up_port $internal_port;
    set $up_path $internal_path;

    if ($up_port = 0) { return 404; }
    if ($up_path = "") { return 404; }
    if ($http_upgrade !~* websocket) { return 404; }

    proxy_redirect off;
    rewrite ^ $up_path break;
    proxy_pass http://127.0.0.1:$up_port;

    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    # Tanpa timeout ini, nginx menutup koneksi idle setelah 60 detik (default).
    # Koneksi VPN/tunnel umumnya idle saat tidak ada traffic aktif, sehingga
    # client akan terus-menerus reconnect. 7 hari cukup untuk koneksi persisten.
    proxy_read_timeout 7d;
    proxy_send_timeout 7d;
  }

  # --- HTTPUpgrade ---
  location ~ ^/(?:[^/]+/)?(vless|vmess|trojan|ss|ss2022)-hup(?:/|$) {
    set $up_port $internal_port;
    set $up_path $internal_path;

    if ($up_port = 0) { return 404; }
    if ($up_path = "") { return 404; }

    proxy_redirect off;
    rewrite ^ $up_path break;
    proxy_pass http://127.0.0.1:$up_port;

    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    proxy_read_timeout 7d;
    proxy_send_timeout 7d;
  }

  # --- gRPC ---
  location ~ ^/(?:[^/]+/)?(vless|vmess|trojan|ss|ss2022)-grpc(?:/|$) {
    set $up_port $internal_port;
    set $svc $grpc_service_name;

    if ($up_port = 0) { return 404; }
    if ($svc = "") { return 404; }

    # normalize to /<serviceName>/Tun
    rewrite ^ /$svc/Tun break;
    grpc_pass grpc://127.0.0.1:$up_port;

    grpc_set_header Host $host;
    grpc_set_header X-Real-IP $remote_addr;
    grpc_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    # Default grpc_read_timeout nginx = 60 detik. gRPC streaming (multiplexed)
    # juga idle saat tidak ada traffic aktif — tanpa ini koneksi akan ter-reset.
    grpc_read_timeout 7d;
    grpc_send_timeout 7d;
  }

  # Default: hide everything else
  location / {
    return 404;
  }
}
