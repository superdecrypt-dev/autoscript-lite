local __OVPN_TCP_BIND__
port __OVPN_TCP_PORT__
proto tcp-server
dev tun
topology subnet
server __OVPN_SERVER_SUBNET__ __OVPN_SERVER_NETMASK__
keepalive 10 60
persist-key
persist-tun
user nobody
group nogroup
verb 3
auth SHA256
cipher AES-256-GCM
data-ciphers AES-256-GCM:AES-128-GCM:CHACHA20-POLY1305
remote-cert-tls client
client-config-dir __OVPN_CCD_DIR__
ccd-exclusive

# Scaffold awal: asset PKI ini belum dipasang otomatis pada fase ini.
ca __OVPN_CA_FILE__
cert __OVPN_CERT_FILE__
key __OVPN_KEY_FILE__
dh __OVPN_DH_FILE__
tls-crypt __OVPN_TLS_CRYPT_FILE__

ifconfig-pool-persist /var/lib/openvpn/ipp.txt
status /var/log/openvpn/ovpn-tcp-status.log
log-append /var/log/openvpn/ovpn-tcp.log
